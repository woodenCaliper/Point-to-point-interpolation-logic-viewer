<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Point-to-Point Interpolation Logic Viewer</title>
  <style>
    :root { --bg:#0e1117; --panel:#161b22; --line:#2a3340; --text:#e6edf3; --muted:#9aa7b7; --accent:#5da9ff; }
    * { box-sizing: border-box; }
    body, html { margin:0; height:100%; background:var(--bg); color:var(--text); font-family: system-ui, -apple-system, sans-serif; }
    .layout { height:100vh; display:grid; grid-template-columns: 300px 1fr 320px; gap:8px; padding:8px; }
    .panel { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:12px; overflow:auto; }
    h1 { margin:0 0 10px; font-size:16px; }
    h2 { margin:12px 0 8px; font-size:13px; color:var(--accent); }
    .group { border:1px solid var(--line); border-radius:8px; padding:8px; margin-bottom:8px; }
    .control { display:grid; gap:4px; margin-bottom:8px; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    label { font-size:12px; color:var(--muted); }
    input, select, button { width:100%; padding:7px 8px; border-radius:8px; border:1px solid #3b4656; background:#0f141b; color:var(--text); }
    .unit { color:#7fb1ff; font-size:11px; }
    .canvas-wrap { height:100%; min-height:420px; border:1px solid var(--line); border-radius:10px; background:#0f141b; overflow:hidden; }
    canvas { width:100%; height:100%; display:block; cursor: grab; }
    canvas.dragging { cursor: grabbing; }
    .stats { font-size:12px; line-height:1.5; white-space:pre-wrap; border:1px solid var(--line); border-radius:8px; padding:8px; background:#0f141b; }
    .small { font-size:11px; color:var(--muted); }
  </style>
</head>
<body>
<div class="layout">
  <aside class="panel">
    <h1>左ペイン: パス生成入力</h1>

    <div class="control">
      <label>補間ロジック</label>
      <select id="algorithm">
        <option value="linear">直線補間 (Linear)</option>
        <option value="dubins">Dubins Path</option>
        <option value="cc_dubins">CC-Dubins Path</option>
      </select>
    </div>

    <div class="group">
      <h2>Start point</h2>
      <div class="row">
        <div class="control"><label>X <span class="unit">[mm]</span></label><input id="sx" type="number" value="-30" /></div>
        <div class="control"><label>Y <span class="unit">[mm]</span></label><input id="sy" type="number" value="-20" /></div>
      </div>
      <div class="control only-theta"><label>θ <span class="unit">[°]</span></label><input id="syaw" type="number" value="20" /></div>
      <div class="control only-curv"><label>k <span class="unit">[1/mm]</span></label><input id="sk" type="number" step="0.001" value="0.02" /></div>
    </div>

    <div class="group">
      <h2>End point</h2>
      <div class="row">
        <div class="control"><label>X <span class="unit">[mm]</span></label><input id="gx" type="number" value="45" /></div>
        <div class="control"><label>Y <span class="unit">[mm]</span></label><input id="gy" type="number" value="30" /></div>
      </div>
      <div class="control only-theta"><label>θ <span class="unit">[°]</span></label><input id="gyaw" type="number" value="-35" /></div>
      <div class="control only-curv"><label>k <span class="unit">[1/mm]</span></label><input id="gk" type="number" step="0.001" value="0.00" /></div>
    </div>

    <div class="group">
      <h2>Path</h2>
      <div class="control only-turn"><label>最小旋回半径 R <span class="unit">[mm]</span></label><input id="radius" type="number" min="1" step="0.5" value="12" /></div>
      <div class="control"><label>サンプル間隔 <span class="unit">[mm]</span></label><input id="step" type="number" min="0.2" step="0.2" value="0.8" /></div>
      <div class="control only-curv"><label>CC遷移率 <span class="unit">[-]</span></label><input id="ccTransition" type="number" min="0.05" max="0.45" step="0.05" value="0.25" /></div>
    </div>

    <div class="row">
      <button id="swapBtn">始終点を入替</button>
      <button id="randomBtn">ランダム</button>
    </div>
    <div class="control" style="margin-top:8px;"><button id="fitBtn">視点を再フィット</button></div>
  </aside>

  <main class="panel" style="padding:8px;">
    <div class="canvas-wrap"><canvas id="canvas"></canvas></div>
  </main>

  <aside class="panel">
    <h1>右ペイン: 表示 / 生成結果</h1>
    <div class="group">
      <h2>表示設定</h2>
      <div class="control"><label><input type="checkbox" id="showGrid" checked /> グリッド</label></div>
      <div class="control"><label><input type="checkbox" id="showPoints" /> サンプル点</label></div>
      <div class="control"><label><input type="checkbox" id="showHeading" checked /> 向き矢印</label></div>
      <div class="control"><label><input type="checkbox" id="showCurvature" checked /> 曲率ガイド</label></div>
      <div class="small">操作: ホイール=ズーム / 左ドラッグ=パン</div>
    </div>
    <div class="group">
      <h2>生成結果</h2>
      <div id="stats" class="stats"></div>
    </div>
    <p class="small">入力単位: 位置=mm / 角度=° / 曲率=1/mm</p>
  </aside>
</div>

<script>
const TAU = Math.PI * 2;
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const $ = id => document.getElementById(id);
const camera = { cx: 0, cy: 0, scale: 1, initialized: false };
let lastResult = null;
let isDragging = false;
let lastMouse = { x: 0, y: 0 };

function deg2rad(d){ return d * Math.PI / 180; }
function rad2deg(r){ return r * 180 / Math.PI; }
function mod2pi(a){ let r = a % TAU; if (r < 0) r += TAU; return r; }
function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

function updateInputVisibility(){
  const algo = $('algorithm').value;
  document.querySelectorAll('.only-theta').forEach(e => e.style.display = (algo === 'linear') ? 'none' : 'grid');
  document.querySelectorAll('.only-turn').forEach(e => e.style.display = (algo === 'linear') ? 'none' : 'grid');
  document.querySelectorAll('.only-curv').forEach(e => e.style.display = (algo === 'cc_dubins') ? 'grid' : 'none');
}

function gatherInput(){
  return {
    algorithm: $('algorithm').value,
    start: { x: Number($('sx').value), y: Number($('sy').value), yaw: deg2rad(Number($('syaw').value || 0)), k: Number($('sk').value || 0) },
    goal: { x: Number($('gx').value), y: Number($('gy').value), yaw: deg2rad(Number($('gyaw').value || 0)), k: Number($('gk').value || 0) },
    radius: Math.max(1, Number($('radius').value || 12)),
    step: Math.max(0.2, Number($('step').value || 0.8)),
    ccTransition: clamp(Number($('ccTransition').value || 0.25), 0.05, 0.45),
    showGrid: $('showGrid').checked,
    showPoints: $('showPoints').checked,
    showHeading: $('showHeading').checked,
    showCurvature: $('showCurvature').checked,
  };
}

function fitView(points, s, g){
  const list = [...points, {x:s.x,y:s.y}, {x:g.x,y:g.y}];
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  for (const p of list){ minX=Math.min(minX,p.x); minY=Math.min(minY,p.y); maxX=Math.max(maxX,p.x); maxY=Math.max(maxY,p.y); }
  const w = canvas.clientWidth, h = canvas.clientHeight;
  const pad = 14;
  const sx = Math.max(10, maxX - minX + pad*2);
  const sy = Math.max(10, maxY - minY + pad*2);
  camera.cx = (minX + maxX) / 2;
  camera.cy = (minY + maxY) / 2;
  camera.scale = Math.min(w / sx, h / sy);
  camera.initialized = true;
}

function ws(x, y){ return { x:(x-camera.cx)*camera.scale + canvas.clientWidth/2, y:canvas.clientHeight/2 - (y-camera.cy)*camera.scale }; }
function sw(px, py){ return { x:(px-canvas.clientWidth/2)/camera.scale + camera.cx, y:(canvas.clientHeight/2-py)/camera.scale + camera.cy }; }

function gridStepForScale(){
  const worldTarget = 80 / camera.scale;
  if (worldTarget <= 0) return 1;
  const p = Math.floor(Math.log10(worldTarget));
  const base = 10 ** p;
  const cand = [1*base, 5*base, 10*base, 50*base, 100*base];
  for (const c of cand) if (worldTarget <= c) return c;
  return 100 * base;
}

function drawGrid(){
  const step = gridStepForScale();
  const left = camera.cx - canvas.clientWidth/(2*camera.scale);
  const right = camera.cx + canvas.clientWidth/(2*camera.scale);
  const bottom = camera.cy - canvas.clientHeight/(2*camera.scale);
  const top = camera.cy + canvas.clientHeight/(2*camera.scale);
  ctx.lineWidth = 1;
  ctx.strokeStyle = '#1f2937';
  for(let x=Math.floor(left/step)*step; x<=right; x+=step){ const a=ws(x,bottom), b=ws(x,top); ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); }
  for(let y=Math.floor(bottom/step)*step; y<=top; y+=step){ const a=ws(left,y), b=ws(right,y); ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); }
}

function drawAxisGizmo(){
  const ox = 46, oy = canvas.clientHeight - 38;
  ctx.strokeStyle = '#9ca3af'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(ox,oy); ctx.lineTo(ox+24,oy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ox,oy); ctx.lineTo(ox,oy-24); ctx.stroke();
  ctx.fillStyle = '#9ca3af'; ctx.font = '11px sans-serif';
  ctx.fillText('+X', ox+26, oy+4);
  ctx.fillText('+Y', ox-8, oy-28);
}

function drawPath(points, showPts){
  if(!points.length) return;
  ctx.strokeStyle='#60a5fa'; ctx.lineWidth=2.5;
  let p=ws(points[0].x, points[0].y);
  ctx.beginPath(); ctx.moveTo(p.x,p.y);
  for(let i=1;i<points.length;i++){ p=ws(points[i].x, points[i].y); ctx.lineTo(p.x,p.y); }
  ctx.stroke();
  if(showPts){
    ctx.fillStyle='#fbbf24';
    for(let i=0;i<points.length;i+=Math.max(1,Math.floor(points.length/220))){ const q=ws(points[i].x,points[i].y); ctx.beginPath(); ctx.arc(q.x,q.y,2,0,TAU); ctx.fill(); }
  }
}

function drawStartIcon(start,cfg){
  const p = ws(start.x,start.y);
  ctx.fillStyle='#22c55e'; ctx.beginPath(); ctx.arc(p.x,p.y,6,0,TAU); ctx.fill();
  if (cfg.algorithm !== 'linear' && cfg.showHeading){
    ctx.strokeStyle='#22c55e'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x + 20*Math.cos(-start.yaw), p.y + 20*Math.sin(-start.yaw)); ctx.stroke();
  }
  if (cfg.algorithm === 'cc_dubins' && cfg.showCurvature && Math.abs(start.k) > 1e-6){
    const R = Math.min(150, Math.abs(1 / start.k));
    const sign = Math.sign(start.k);
    const nx = -Math.sin(start.yaw) * sign;
    const ny = Math.cos(start.yaw) * sign;
    const c = ws(start.x + nx*R, start.y + ny*R);
    ctx.strokeStyle='#86efac'; ctx.lineWidth=1.5; ctx.setLineDash([5,4]);
    ctx.beginPath(); ctx.arc(c.x,c.y,R*camera.scale,0,TAU); ctx.stroke(); ctx.setLineDash([]);
  }
}

function drawGoalIcon(goal,cfg){
  const p = ws(goal.x,goal.y);
  ctx.fillStyle='#f97316'; ctx.beginPath(); ctx.arc(p.x,p.y,6,0,TAU); ctx.fill();
  if (cfg.algorithm !== 'linear' && cfg.showHeading){
    ctx.strokeStyle='#f97316'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x + 20*Math.cos(-goal.yaw), p.y + 20*Math.sin(-goal.yaw)); ctx.stroke();
  }
}

function sampleLinear(s,g,step){
  const dx=g.x-s.x, dy=g.y-s.y, dist=Math.hypot(dx,dy), n=Math.max(2,Math.ceil(dist/step)+1), pts=[];
  for(let i=0;i<n;i++){ const t=i/(n-1); pts.push({x:s.x+dx*t,y:s.y+dy*t,yaw:Math.atan2(dy,dx)}); }
  return { points:pts, totalLength:dist, segments:['S'], type:'Linear' };
}

function transformToLocal(s,g,R){
  const dx=(g.x-s.x)/R, dy=(g.y-s.y)/R;
  const x=Math.cos(s.yaw)*dx + Math.sin(s.yaw)*dy;
  const y=-Math.sin(s.yaw)*dx + Math.cos(s.yaw)*dy;
  return { x, y, th:mod2pi(g.yaw-s.yaw) };
}

function dubinsWord(x,y,phi,type){
  const d=Math.hypot(x,y), th=mod2pi(Math.atan2(y,x)), a=mod2pi(-th), b=mod2pi(phi-th);
  const LSL=()=>{ const p2=2+d*d-2*Math.cos(a-b)+2*d*(Math.sin(a)-Math.sin(b)); if(p2<0)return null; const p=Math.sqrt(p2); const t=mod2pi(-a+Math.atan2(Math.cos(b)-Math.cos(a),d+Math.sin(a)-Math.sin(b))); const q=mod2pi(b-Math.atan2(Math.cos(b)-Math.cos(a),d+Math.sin(a)-Math.sin(b))); return [t,p,q]; };
  const RSR=()=>{ const p2=2+d*d-2*Math.cos(a-b)+2*d*(-Math.sin(a)+Math.sin(b)); if(p2<0)return null; const p=Math.sqrt(p2); const t=mod2pi(a-Math.atan2(Math.cos(a)-Math.cos(b),d-Math.sin(a)+Math.sin(b))); const q=mod2pi(-b+Math.atan2(Math.cos(a)-Math.cos(b),d-Math.sin(a)+Math.sin(b))); return [t,p,q]; };
  const LSR=()=>{ const p2=-2+d*d+2*Math.cos(a-b)+2*d*(Math.sin(a)+Math.sin(b)); if(p2<0)return null; const p=Math.sqrt(p2); const tmp=Math.atan2(-Math.cos(a)-Math.cos(b),d+Math.sin(a)+Math.sin(b))-Math.atan2(-2,p); return [mod2pi(-a+tmp),p,mod2pi(-b+tmp)]; };
  const RSL=()=>{ const p2=d*d-2+2*Math.cos(a-b)-2*d*(Math.sin(a)+Math.sin(b)); if(p2<0)return null; const p=Math.sqrt(p2); const tmp=Math.atan2(Math.cos(a)+Math.cos(b),d-Math.sin(a)-Math.sin(b))-Math.atan2(2,p); return [mod2pi(a-tmp),p,mod2pi(b-tmp)]; };
  const RLR=()=>{ const tmp=(6-d*d+2*Math.cos(a-b)+2*d*(Math.sin(a)-Math.sin(b)))/8; if(Math.abs(tmp)>1)return null; const p=mod2pi(TAU-Math.acos(tmp)); const t=mod2pi(a-Math.atan2(Math.cos(a)-Math.cos(b),d-Math.sin(a)+Math.sin(b))+p/2); return [t,p,mod2pi(a-b-t+p)]; };
  const LRL=()=>{ const tmp=(6-d*d+2*Math.cos(a-b)+2*d*(-Math.sin(a)+Math.sin(b)))/8; if(Math.abs(tmp)>1)return null; const p=mod2pi(TAU-Math.acos(tmp)); const t=mod2pi(-a-Math.atan2(Math.cos(a)-Math.cos(b),d+Math.sin(a)-Math.sin(b))+p/2); return [t,p,mod2pi(b-a-t+p)]; };
  return ({LSL,RSR,LSR,RSL,RLR,LRL})[type]();
}

function sampleDubins(s,g,R,step){
  const local=transformToLocal(s,g,R), types=['LSL','RSR','LSR','RSL','RLR','LRL'];
  let best=null;
  for(const t of types){ const seg=dubinsWord(local.x,local.y,local.th,t); if(!seg)continue; const c=seg[0]+seg[1]+seg[2]; if(!best||c<best.cost) best={type:t,seg,cost:c}; }
  if(!best) return { points:[], totalLength:NaN, segments:[], type:'N/A' };
  const q={x:0,y:0,yaw:0}, list=[{...q}], modes=best.type.split('');
  const integ=(m,len)=>{ const dir=m==='L'?1:m==='R'?-1:0; const n=Math.max(1,Math.ceil((len*R)/step)); const ds=len/n; for(let i=0;i<n;i++){ if(dir===0){ q.x+=ds*Math.cos(q.yaw); q.y+=ds*Math.sin(q.yaw);} else { const y2=q.yaw+dir*ds; q.x+=Math.sin(y2)-Math.sin(q.yaw); q.y+=-Math.cos(y2)+Math.cos(q.yaw); q.yaw=y2; } list.push({...q}); } };
  integ(modes[0],best.seg[0]); integ(modes[1],best.seg[1]); integ(modes[2],best.seg[2]);
  const c=Math.cos(s.yaw), si=Math.sin(s.yaw);
  const points=list.map(p=>({x:s.x+R*(c*p.x-si*p.y),y:s.y+R*(si*p.x+c*p.y),yaw:mod2pi(s.yaw+p.yaw)}));
  return { points, totalLength:best.cost*R, segments:modes, type:best.type, rawSeg:best.seg.map(v=>v*R) };
}

function sampleCCDubins(s,g,R,step,trRate){
  const base=sampleDubins(s,g,R,step); if(!base.points.length) return base;
  const target=1/R, tr=Math.max(step*3,R*trRate), pts=[{x:s.x,y:s.y,yaw:s.yaw}], st={x:s.x,y:s.y,yaw:s.yaw,k:s.k||0};
  const adv=(ds,kN)=>{ const kM=(st.k+kN)/2; const yM=st.yaw+0.5*kM*ds; st.x+=ds*Math.cos(yM); st.y+=ds*Math.sin(yM); st.yaw=mod2pi(st.yaw+kM*ds); st.k=kN; pts.push({x:st.x,y:st.y,yaw:st.yaw}); };
  for(let i=0;i<base.segments.length;i++){
    const m=base.segments[i], L=(base.rawSeg||[])[i]||0, sign=m==='L'?1:m==='R'?-1:0;
    if(m==='S'){ const n=Math.max(1,Math.ceil(L/step)); for(let j=0;j<n;j++) adv(L/n,0); continue; }
    const lin=Math.min(tr,L*0.5), nIn=Math.max(1,Math.ceil(lin/step)); for(let j=1;j<=nIn;j++) adv(lin/nIn, sign*target*(j/nIn));
    const mid=Math.max(0,L-2*lin), nMid=Math.max(0,Math.floor(mid/step)); for(let j=0;j<nMid;j++) adv(mid/nMid,sign*target);
    const nOut=Math.max(1,Math.ceil(lin/step)); for(let j=nOut;j>=1;j--) adv(lin/nOut, sign*target*((j-1)/nOut));
  }
  pts[pts.length-1]={x:g.x,y:g.y,yaw:g.yaw};
  let len=0; for(let i=1;i<pts.length;i++) len += Math.hypot(pts[i].x-pts[i-1].x, pts[i].y-pts[i-1].y);
  return { points:pts, totalLength:len, segments:base.segments, type:`CC from ${base.type}` };
}

function calculate(){
  updateInputVisibility();
  const cfg = gatherInput();
  const res = cfg.algorithm === 'linear' ? sampleLinear(cfg.start,cfg.goal,cfg.step)
            : cfg.algorithm === 'dubins' ? sampleDubins(cfg.start,cfg.goal,cfg.radius,cfg.step)
            : sampleCCDubins(cfg.start,cfg.goal,cfg.radius,cfg.step,cfg.ccTransition);
  lastResult = { cfg, res };
  if (!camera.initialized) fitView(res.points, cfg.start, cfg.goal);
  return lastResult;
}

function render(){
  if (!lastResult) calculate();
  const { cfg, res } = lastResult;
  ctx.clearRect(0,0,canvas.clientWidth,canvas.clientHeight);
  if(cfg.showGrid) drawGrid();
  drawPath(res.points,cfg.showPoints);
  drawStartIcon(cfg.start,cfg);
  drawGoalIcon(cfg.goal,cfg);
  drawAxisGizmo();
  $('stats').textContent = [
    `アルゴリズム: ${cfg.algorithm}`,
    `経路タイプ: ${res.type ?? '-'}`,
    `経路長: ${Number.isFinite(res.totalLength) ? res.totalLength.toFixed(2) + ' mm' : 'N/A'}`,
    `セグメント: ${res.segments?.join(' → ') ?? '-'}`,
    `サンプル点数: ${res.points?.length ?? 0}`,
    `視点スケール: ${camera.scale.toFixed(3)} px/mm`,
    `始点: (${cfg.start.x.toFixed(1)}, ${cfg.start.y.toFixed(1)}) mm`,
  ].join('\n');
}

function draw(recalc=true){ if(recalc) calculate(); render(); }

function resize(){
  const dpr = window.devicePixelRatio || 1;
  const r = canvas.getBoundingClientRect();
  canvas.width = Math.floor(r.width * dpr);
  canvas.height = Math.floor(r.height * dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
  if (lastResult && !camera.initialized) fitView(lastResult.res.points, lastResult.cfg.start, lastResult.cfg.goal);
  render();
}
window.addEventListener('resize', resize);

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  if (!lastResult) return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const before = sw(mx, my);
  const zoom = Math.exp(-e.deltaY * 0.0012);
  camera.scale = clamp(camera.scale * zoom, 0.02, 200);
  const after = sw(mx, my);
  camera.cx += before.x - after.x;
  camera.cy += before.y - after.y;
  render();
}, { passive:false });

canvas.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  isDragging = true;
  canvas.classList.add('dragging');
  lastMouse = { x: e.clientX, y: e.clientY };
});
window.addEventListener('mouseup', () => { isDragging = false; canvas.classList.remove('dragging'); });
window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - lastMouse.x;
  const dy = e.clientY - lastMouse.y;
  camera.cx -= dx / camera.scale;
  camera.cy += dy / camera.scale;
  lastMouse = { x: e.clientX, y: e.clientY };
  render();
});

['algorithm','sx','sy','syaw','sk','gx','gy','gyaw','gk','radius','step','ccTransition','showGrid','showPoints','showHeading','showCurvature']
  .forEach(id => { $(id).addEventListener('input', ()=>draw(true)); $(id).addEventListener('change', ()=>draw(true)); });

$('swapBtn').addEventListener('click', ()=>{
  const s = ['sx','sy','syaw','sk'].map(id => $(id).value);
  const g = ['gx','gy','gyaw','gk'].map(id => $(id).value);
  ['sx','sy','syaw','sk'].forEach((id,i)=> $(id).value = g[i]);
  ['gx','gy','gyaw','gk'].forEach((id,i)=> $(id).value = s[i]);
  draw(true);
});
$('randomBtn').addEventListener('click', ()=>{
  const r=(a,b)=> (Math.random()*(b-a)+a).toFixed(1);
  $('sx').value=r(-60,-10); $('sy').value=r(-40,40); $('gx').value=r(10,60); $('gy').value=r(-40,40);
  $('syaw').value=r(-180,180); $('gyaw').value=r(-180,180); $('sk').value=(Math.random()*0.04-0.02).toFixed(3);
  camera.initialized = false;
  draw(true);
});
$('fitBtn').addEventListener('click', ()=>{ if(lastResult){ fitView(lastResult.res.points,lastResult.cfg.start,lastResult.cfg.goal); render(); } });

draw(true);
resize();
</script>
</body>
</html>
